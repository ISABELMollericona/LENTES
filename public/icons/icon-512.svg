<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="60" fill="#1a1a1a"/>
  <!-- Decorative ring -->
  <circle cx="256" cy="240" r="180" fill="none" stroke="#D4AF3718" stroke-width="2"/>
  <!-- Outer frame left lens -->
  <circle cx="160" cy="248" r="98" fill="none" stroke="#D4AF37" stroke-width="22"/>
  <!-- Inner lens left gradient fill -->
  <circle cx="160" cy="248" r="68" fill="#D4AF3715"/>
  <!-- Lens glare left -->
  <ellipse cx="138" cy="220" rx="22" ry="14" fill="#ffffff10" transform="rotate(-30 138 220)"/>
  <!-- Outer frame right lens -->
  <circle cx="352" cy="248" r="98" fill="none" stroke="#D4AF37" stroke-width="22"/>
  <!-- Inner lens right gradient fill -->
  <circle cx="352" cy="248" r="68" fill="#D4AF3715"/>
  <!-- Lens glare right -->
  <ellipse cx="330" cy="220" rx="22" ry="14" fill="#ffffff10" transform="rotate(-30 330 220)"/>
  <!-- Bridge -->
  <path d="M258 248 Q255 232 255 248" fill="none" stroke="#D4AF37" stroke-width="16" stroke-linecap="round"/>
  <!-- Left temple arm -->
  <line x1="62" y1="220" x2="62" y2="248" stroke="#D4AF37" stroke-width="16" stroke-linecap="round"/>
  <!-- Right temple arm -->
  <line x1="450" y1="220" x2="450" y2="248" stroke="#D4AF37" stroke-width="16" stroke-linecap="round"/>
  <!-- ÓPTICA GOLDEN text -->
  <text x="256" y="404" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="42" font-weight="bold" letter-spacing="4" fill="#D4AF37">ÓPTICA</text>
  <text x="256" y="450" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="42" font-weight="bold" letter-spacing="6" fill="#D4AF37">GOLDEN</text>
  <!-- Decorative lines -->
  <line x1="90" y1="418" x2="166" y2="418" stroke="#D4AF3766" stroke-width="1.5"/>
  <line x1="346" y1="418" x2="422" y2="418" stroke="#D4AF3766" stroke-width="1.5"/>
</svg>
