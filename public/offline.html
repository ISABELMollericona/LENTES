<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — Óptica Golden</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #d0d0d0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    h1 {
      font-size: 1.8rem;
      color: #D4AF37;
      margin-bottom: 0.75rem;
      letter-spacing: 1px;
    }
    p {
      font-size: 1rem;
      color: #999;
      max-width: 340px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #D4AF37;
      color: #1a1a1a;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .divider {
      width: 60px;
      height: 2px;
      background: #D4AF3755;
      margin: 1.5rem auto;
    }
    .brand {
      font-size: 0.85rem;
      color: #D4AF37;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 3rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
    <rect width="192" height="192" rx="24" fill="#2a2a2a"/>
    <circle cx="62" cy="96" r="38" fill="none" stroke="#D4AF37" stroke-width="9"/>
    <circle cx="130" cy="96" r="38" fill="none" stroke="#D4AF37" stroke-width="9"/>
    <path d="M100 96 Q96 90 96 96" fill="none" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
    <line x1="24" y1="86" x2="24" y2="96" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
    <line x1="168" y1="86" x2="168" y2="96" stroke="#D4AF37" stroke-width="7" stroke-linecap="round"/>
    <!-- Wifi off icon overlay -->
    <line x1="80" y1="150" x2="112" y2="150" stroke="#D4AF3788" stroke-width="4" stroke-linecap="round"/>
    <line x1="70" y1="138" x2="122" y2="138" stroke="#D4AF3744" stroke-width="4" stroke-linecap="round"/>
  </svg>

  <h1>Sin conexión</h1>
  <div class="divider"></div>
  <p>No hay conexión a internet en este momento. Algunas funciones pueden no estar disponibles hasta que te vuelvas a conectar.</p>

  <button class="btn" onclick="window.location.reload()">Reintentar conexión</button>

  <p class="brand">Óptica Golden</p>
</body>
</html>
